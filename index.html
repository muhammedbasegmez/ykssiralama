<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ÜMTAL Koç">
  <meta name="theme-color" content="#07070f">
  <title>ÜMTAL 2025 YKS Analiz Sistemi</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root { --bg: #07070f; --card: #0c0c1e; --accent: #4488ff; --text: #eeeeff; --success: #00ff88; --danger: #ff5555; }
    body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
    .header { background: linear-gradient(135deg, #0c0c1e, #111128); padding: 25px; border-bottom: 1px solid #1a1a35; }
    .header h1 { font-family: 'Bebas Neue', sans-serif; margin: 0; font-size: 32px; letter-spacing: 2px; }
    .header span { color: var(--accent); }
    .main-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; padding: 20px; }
    .card { background: var(--card); border: 1px solid #1a1a35; border-radius: 20px; padding: 20px; }
    .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }
    .result-box { background: rgba(68, 136, 255, 0.05); border: 1.5px solid #1e1e35; border-radius: 16px; padding: 15px; position: relative; transition: all 0.3s ease; }
    .result-box.yer { border-color: var(--success); background: rgba(0, 255, 136, 0.03); }
    .label { font-size: 10px; font-weight: 800; color: #666688; letter-spacing: 1.5px; margin-bottom: 5px; }
    .score { font-family: 'Bebas Neue', sans-serif; font-size: 36px; line-height: 1; margin: 5px 0; color: var(--text); }
    .rank { font-size: 16px; font-weight: 600; color: #8888aa; }
    .rank b { color: var(--text); font-size: 18px; }
    input[type="number"] { width: 100%; background: #07070f; border: 1px solid #333355; color: #fff; padding: 10px; border-radius: 10px; font-weight: bold; font-size: 16px; outline: none; }
    .net-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .net-label { font-size: 13px; color: #9999bb; font-weight: 600; }
    .net-input { width: 65px !important; text-align: center; }
    .obp-container { background: #111128; border: 1px solid #2a2a44; border-radius: 12px; padding: 15px; margin: 0 20px 20px 20px; display: flex; align-items: center; justify-content: space-between; }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    // SIRALAMA MANTIĞI: GÖNDERDİĞİNİZ PDF VE VERİLERLE EŞLENMİŞ ÇAPA NOKTALARI
    // [Puan, Sıralama] formatında gerçek veriler
    const SAY_ANCHORS = [[500, 100], [459.11, 4978], [436.26, 14416], [411.95, 30822], [408.27, 33792], [350, 156371], [200, 1100000]];
    const TYT_ANCHORS = [[500, 50], [461.71, 1731], [441.90, 7301], [411.36, 29699], [350.44, 156371], [200, 2500000]];

    const interpolate = (puan, table) => {
      if (puan >= table[0][0]) return table[0][1];
      if (puan <= table[table.length - 1][0]) return table[table.length - 1][1];
      for (let i = 0; i < table.length - 1; i++) {
        const [p1, s1] = table[i];
        const [p2, s2] = table[i + 1];
        if (puan <= p1 && puan >= p2) {
          // Logaritmik yığılma eğrisi hesabı
          const logS1 = Math.log(s1);
          const logS2 = Math.log(s2);
          const val = logS1 + (puan - p1) * (logS2 - logS1) / (p2 - p1);
          return Math.round(Math.exp(val));
        }
      }
      return table[table.length - 1][1];
    };

    function App() {
      const [obpVal, setObpVal] = useState("84");
      const [tyt, setTyt] = useState({ tr: 0, sos: 0, mat: 0, fen: 0 });
      const [ayt, setAyt] = useState({ mat: 0, fiz: 0, kim: 0, bio: 0 });

      const results = useMemo(() => {
        // ÖSYM 2025 Kılavuz ve Hesaplama.net kesin katsayıları
        const tytHam = 100 + (tyt.tr * 3.385) + (tyt.sos * 3.35) + (tyt.mat * 3.42) + (tyt.fen * 3.45);
        
        // Sayısal puanında AYT'nin %60, TYT'nin %40 etkisi
        const aytHam = (ayt.mat * 3.05) + (ayt.fiz * 2.92) + (ayt.kim * 3.12) + (ayt.bio * 3.08);
        const sayHam = 100 + (tyt.tr * 1.34) + (tyt.sos * 1.32) + (tyt.mat * 1.36) + (tyt.fen * 1.38) + aytHam;

        const aobp = (parseFloat(obpVal) || 0) * 0.6;
        
        return {
          tytH: Math.min(500, tytHam),
          tytY: Math.min(560, tytHam + aobp),
          sayH: Math.min(500, sayHam),
          sayY: Math.min(560, sayHam + aobp),
          sTytH: interpolate(tytHam, TYT_ANCHORS),
          sTytY: interpolate(tytHam + aobp, TYT_ANCHORS),
          sSayH: interpolate(sayHam, SAY_ANCHORS),
          sSayY: interpolate(sayHam + aobp, SAY_ANCHORS)
        };
      }, [tyt, ayt, obpVal]);

      const handleInput = (set, field, max) => (e) => {
        const v = Math.min(max, Math.max(0, parseFloat(e.target.value) || 0));
        set(prev => ({ ...prev, [field]: v }));
      };

      return (
        <div>
          <div className="header">
            <h1>ÜMTAL <span>SAYISAL</span> ANALİZ</h1>
            <p style={{margin:0, opacity:0.6, fontSize:12}}>Hatasız Sıralama ve Yığılma Motoru v2.5</p>
          </div>

          <div style={{paddingTop:20}}>
            <div className="obp-container">
              <span style={{fontWeight:800, fontSize:13, color:'#8888aa'}}>DİPLOMA NOTU (OBP)</span>
              <input type="number" value={obpVal} onChange={(e) => setObpVal(e.target.value)} style={{width:80, color:'#00ff88', fontSize:22}} />
            </div>
          </div>

          <div className="results-grid">
            <div className="result-box">
              <div className="label">TYT HAM</div>
              <div className="score">{results.tytH.toFixed(3)}</div>
              <div className="rank">Sıra: <b>{results.sTytH.toLocaleString()}</b></div>
            </div>
            <div className="result-box yer">
              <div className="label">Y-TYT (YERLEŞTİRME)</div>
              <div className="score">{results.tytY.toFixed(3)}</div>
              <div className="rank">Sıra: <b>{results.sTytY.toLocaleString()}</b></div>
            </div>
            <div className="result-box">
              <div className="label">SAYISAL HAM</div>
              <div className="score">{results.sayH.toFixed(3)}</div>
              <div className="rank">Sıra: <b>{results.sSayH.toLocaleString()}</b></div>
            </div>
            <div className="result-box yer">
              <div className="label">Y-SAY (YERLEŞTİRME)</div>
              <div className="score">{results.sayY.toFixed(3)}</div>
              <div className="rank">Sıra: <b>{results.sSayY.toLocaleString()}</b></div>
            </div>
          </div>

          <div className="main-grid">
            <div className="card">
              <div style={{fontFamily:'Bebas Neue', color:'var(--accent)', fontSize:22, marginBottom:15}}>TYT NETLERİ</div>
              {[["Türkçe","tr",40],["Sosyal","sos",20],["Matematik","mat",40],["Fen","fen",20]].map(([l,f,m]) => (
                <div className="net-row" key={f}>
                  <span className="net-label">{l}</span>
                  <input type="number" className="net-input" value={tyt[f]} onChange={handleInput(setTyt, f, m)} />
                </div>
              ))}
            </div>
            <div className="card">
              <div style={{fontFamily:'Bebas Neue', color:'var(--accent)', fontSize:22, marginBottom:15}}>AYT SAYISAL NETLERİ</div>
              {[["Matematik","mat",40],["Fizik","fiz",14],["Kimya","kim",13],["Biyoloji","bio",13]].map(([l,f,m]) => (
                <div className="net-row" key={f}>
                  <span className="net-label">{l}</span>
                  <input type="number" className="net-input" value={ayt[f]} onChange={handleInput(setAyt, f, m)} />
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
