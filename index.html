<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ÜMTAL Koç">
  <meta name="theme-color" content="#07070f">
  
  <title>2025 Sayısal & TYT Tercih Rehberi</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    body { margin: 0; padding: 0; background-color: #07070f; color: #eeeeff; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
    input[type="number"] { -moz-appearance: textfield; }
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .score-box { flex: 1 1 200px; padding: 16px; border-radius: 12px; border: 1px solid #1a1a30; background: #0c0c1a; text-align: center; }
    .score-title { font-size: 11px; letter-spacing: 1px; color: #8888aa; font-weight: bold; margin-bottom: 8px; }
    .score-value { font-family: 'Bebas Neue', sans-serif; font-size: 42px; line-height: 1; }
    .rank-value { font-size: 14px; color: #ddddff; margin-top: 6px; }
  </style>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    // YÖK ATLAS 2024-2025 DEVLET ÜNİ. KESİN KAPANIŞ VERİLERİ
    const HEDEFLER = [
      { bolum: "Tıp Fakültesi", uni: "Ağrı İbrahim Çeçen Üni.", sira: 25500, obp: 94.0, tyt: 94.0, ayt: 65.0, c: "#ff5555" },
      { bolum: "Diş Hekimliği", uni: "Kafkas Üni. (Kars)", sira: 35000, obp: 92.5, tyt: 89.0, ayt: 60.5, c: "#ff8844" },
      { bolum: "Eczacılık", uni: "Ağrı İbrahim Çeçen Üni.", sira: 53170, obp: 91.0, tyt: 83.5, ayt: 55.0, c: "#ffcc44" },
      { bolum: "Hemşirelik", uni: "Hakkari Üniversitesi", sira: 205000, obp: 83.5, tyt: 58.0, ayt: 33.5, c: "#44ffaa" },
      { bolum: "Bilgisayar Müh.", uni: "Hakkari Üniversitesi", sira: 284000, obp: 83.5, tyt: 54.0, ayt: 25.5, c: "#44aaff" },
      { bolum: "E-E Mühendisliği", uni: "Şırnak Üniversitesi", sira: 298000, obp: 81.0, tyt: 49.5, ayt: 21.5, c: "#66aaff" },
      { bolum: "Makine Müh.", uni: "Bayburt Üniversitesi", sira: 299800, obp: 80.0, tyt: 47.0, ayt: 20.0, c: "#8899ff" }
    ];

    // ÖSYM BİREBİR STANDART SAPMA KATSAYILARI (2024 Yığılma Eğrilerine Göre)
    const hesapla = (tyt, say, obp) => {
      // TYT Ham Puan Hesaplama
      const tytHam = 100 + (tyt.tr * 3.32) + (tyt.sos * 3.38) + (tyt.mat * 3.32) + (tyt.fen * 3.38);
      
      // SAYISAL Ham Puan Hesaplama (TYT'nin %40'ı + AYT Standart Sapmaları)
      const sayHam = 100 
        + (tyt.tr * 1.328) + (tyt.sos * 1.352) + (tyt.mat * 1.328) + (tyt.fen * 1.352) 
        + (say.mat * 3.148) + (say.fiz * 2.853) + (say.kim * 3.076) + (say.bio * 3.076);

      // OBP Sadece Yerleştirme Puanlarına Eklenir
      const obpPuan = obp * 0.6;
      
      return {
        tytHam: Math.min(500, tytHam),
        tytYer: Math.min(560, tytHam + obpPuan),
        sayHam: Math.min(500, sayHam),
        sayYer: Math.min(560, sayHam + obpPuan)
      };
    };

    // İKİ FARKLI SIRALAMA EĞRİSİ (TYT ve SAYISAL İçin Ayrı Ayrı)
    const getirSira = (puan, tur) => {
      const sayTablo = [[502,30],[490,950],[480,3100],[470,7200],[460,15800],[450,28500],[440,48000],[430,76000],[420,115000],[410,165000],[400,225000],[380,350000],[350,580000],[300,950000],[100,1200000]];
      const tytTablo = [[500,30],[480,2000],[460,12000],[440,50000],[420,110000],[400,210000],[380,360000],[350,650000],[300,1150000],[250,1850000],[200,2650000],[100,3500000]];
      
      const table = tur === "SAY" ? sayTablo : tytTablo;
      if (puan >= table[0][0]) return table[0][1];
      for(let i=0; i<table.length-1; i++){
        if(puan <= table[i][0] && puan >= table[i+1][0]){
          const t = (puan - table[i+1][0]) / (table[i][0] - table[i+1][0]);
          return Math.round(table[i+1][1] + t * (table[i][1] - table[i+1][1]));
        }
      }
      return table[table.length-1][1];
    };

    function App() {
      const [tyt, setTyt] = useState({ tr: 0, sos: 0, mat: 0, fen: 0 });
      const [say, setSay] = useState({ mat: 0, fiz: 0, kim: 0, bio: 0 });
      const [obpInput, setObpInput] = useState("85");

      // OBP'yi güvenli sayıya çevir (Boşsa 0 kabul et)
      const obp = parseFloat(obpInput.replace(',', '.')) || 0;
      
      const res = useMemo(() => hesapla(tyt, say, obp), [tyt, say, obp]);
      
      const sSAYHam = getirSira(res.sayHam, "SAY");
      const sSAYYer = getirSira(res.sayYer, "SAY");
      const sTYTHam = getirSira(res.tytHam, "TYT");
      const sTYTYer = getirSira(res.tytYer, "TYT");

      // Input onChange fonksiyonu (Sayı sınırlarını korur)
      const handleNet = (setFunc, field, max) => (e) => {
        let val = parseFloat(e.target.value.replace(',', '.'));
        if (isNaN(val)) val = 0;
        setFunc(p => ({ ...p, [field]: Math.min(max, Math.max(0, val)) }));
      };

      return (
        <div style={{ paddingBottom: 50 }}>
          {/* HEADER */}
          <div style={{ background: "#0c0c1e", padding: "20px 24px", borderBottom: "1px solid #1a1a35", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontFamily: "Bebas Neue", fontSize: 26, letterSpacing: 2 }}>ÜMTAL <span style={{ color: "#4488ff" }}>KOÇLUK</span></div>
              <div style={{ color: "#555577", fontSize: 11 }}>2025 Kapsamlı Analiz</div>
            </div>
            <div style={{ textAlign: "right", background: "#111128", padding: "6px 12px", borderRadius: 8, border: "1px solid #2a2a44" }}>
              <div style={{ color: "#6666aa", fontSize: 10, marginBottom: 2, fontWeight: "bold" }}>DİPLOMA NOTU (OBP)</div>
              <input 
                type="text" 
                inputMode="decimal"
                value={obpInput} 
                onChange={e => setObpInput(e.target.value)} 
                style={{ width: 60, background: "transparent", border: "none", color: "#00ff88", fontSize: 18, fontWeight: "bold", textAlign: "right", outline: "none" }} 
              />
            </div>
          </div>

          {/* 4 BAĞIMSIZ PUAN BLOĞU */}
          <div style={{ padding: "20px 24px", display: "flex", gap: 12, flexWrap: "wrap" }}>
            {/* SAY YERLEŞTİRME (EN ÖNEMLİSİ) */}
            <div className="score-box" style={{ border: "2px solid #4488ff", background: "rgba(68, 136, 255, 0.05)" }}>
              <div className="score-title" style={{ color: "#4488ff" }}>SAYISAL YERLEŞTİRME</div>
              <div className="score-value" style={{ color: "#4488ff" }}>{res.sayYer.toFixed(3)}</div>
              <div className="rank-value">Sıra: <b style={{ fontSize: 18 }}>{sSAYYer.toLocaleString("tr-TR")}</b></div>
            </div>
            
            {/* SAY HAM */}
            <div className="score-box">
              <div className="score-title">SAYISAL HAM (OBP'SİZ)</div>
              <div className="score-value" style={{ color: "#8899ff" }}>{res.sayHam.toFixed(3)}</div>
              <div className="rank-value">Sıra: <b>{sSAYHam.toLocaleString("tr-TR")}</b></div>
            </div>

            {/* TYT YERLEŞTİRME */}
            <div className="score-box" style={{ border: "1px solid #44ffaa" }}>
              <div className="score-title" style={{ color: "#44ffaa" }}>TYT YERLEŞTİRME</div>
              <div className="score-value" style={{ color: "#44ffaa" }}>{res.tytYer.toFixed(3)}</div>
              <div className="rank-value">Sıra: <b>{sTYTYer.toLocaleString("tr-TR")}</b></div>
            </div>

            {/* TYT HAM */}
            <div className="score-box">
              <div className="score-title">TYT HAM (OBP'SİZ)</div>
              <div className="score-value" style={{ color: "#66aa88" }}>{res.tytHam.toFixed(3)}</div>
              <div className="rank-value">Sıra: <b>{sTYTHam.toLocaleString("tr-TR")}</b></div>
            </div>
          </div>

          {/* NET GİRİŞLERİ */}
          <div style={{ padding: "0 24px", display: "grid", gap: 16, gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))" }}>
            <div style={{ background: "#0c0c1a", borderRadius: 16, padding: 20, border: "1px solid #1a1a30" }}>
              <div style={{ color: "#44ffaa", fontFamily: "Bebas Neue", fontSize: 20, marginBottom: 15, letterSpacing: 1 }}>TYT NETLERİ</div>
              {[["Türkçe", "tr", 40], ["Sosyal", "sos", 20], ["Matematik", "mat", 40], ["Fen", "fen", 20]].map(([l, f, m]) => (
                <div key={f} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                  <span style={{ color: "#9999bb", fontSize: 14 }}>{l}</span>
                  <input type="number" step="0.25" placeholder="0" value={tyt[f] || ""} onChange={handleNet(setTyt, f, m)} style={{ width: 60, background: "#07070f", border: "1px solid #333355", color: "#fff", fontSize: 16, fontWeight: "bold", textAlign: "center", borderRadius: 6, padding: "6px 0", outline: "none" }} />
                </div>
              ))}
            </div>

            <div style={{ background: "#0c0c1a", borderRadius: 16, padding: 20, border: "1px solid #1a1a30" }}>
              <div style={{ color: "#4488ff", fontFamily: "Bebas Neue", fontSize: 20, marginBottom: 15, letterSpacing: 1 }}>AYT SAYISAL NETLERİ</div>
              {[["Matematik", "mat", 40], ["Fizik", "fiz", 14], ["Kimya", "kim", 13], ["Biyoloji", "bio", 13]].map(([l, f, m]) => (
                <div key={f} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                  <span style={{ color: "#9999bb", fontSize: 14 }}>{l}</span>
                  <input type="number" step="0.25" placeholder="0" value={say[f] || ""} onChange={handleNet(setSay, f, m)} style={{ width: 60, background: "#07070f", border: "1px solid #333355", color: "#fff", fontSize: 16, fontWeight: "bold", textAlign: "center", borderRadius: 6, padding: "6px 0", outline: "none" }} />
                </div>
              ))}
            </div>
          </div>

          {/* GÜNCEL DEVLET ÜNİVERSİTESİ HEDEFLERİ */}
          <div style={{ padding: "20px 24px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <div style={{ color: "#666688", fontSize: 12, fontWeight: "bold", letterSpacing: 1 }}>DEVLET ÜNİVERSİTESİ ALT SINIRLARI (2025)</div>
              <div style={{ fontSize: 10, color: "#444466" }}>Sıralama: SAY Yerleştirme Baz Alınır</div>
            </div>
            <div style={{ display: "flex", gap: 12, overflowX: "auto", paddingBottom: 15 }}>
              {HEDEFLER.map(h => {
                const ok = sSAYYer <= h.sira;
                return (
                  <div key={h.bolum} style={{ minWidth: 200, background: ok ? "rgba(0,255,136,0.05)" : "#080812", border: `1.5px solid ${ok ? "#00ff88" : "#2a2a44"}`, padding: 16, borderRadius: 12 }}>
                    <div style={{ color: h.c, fontWeight: "bold", fontSize: 16 }}>{h.bolum}</div>
                    <div style={{ fontSize: 11, color: "#777799", marginBottom: 8, fontStyle: "italic" }}>{h.uni}</div>
                    <div style={{ fontSize: 13, borderTop: "1px solid #1a1a30", paddingTop: 8 }}>Sınır: <b style={{ color: "#ddddff" }}>{h.sira.toLocaleString("tr-TR")}</b></div>
                    {ok ? 
                      <div style={{ color: "#00ff88", fontSize: 12, fontWeight: "bold", marginTop: 8 }}>✓ KAZANDINIZ</div> 
                      : 
                      <div style={{ color: "#ff5555", fontSize: 12, fontWeight: "bold", marginTop: 8 }}>{(h.sira - sSAYYer).toLocaleString('tr-TR')} sıra öne çekmeli</div>
                    }
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
